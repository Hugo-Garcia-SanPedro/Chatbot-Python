<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Local Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h2>✨ Mi IA Local</h2>
            <p>Arquitectura Transformer</p>
        </header>
        
        <div class="chat-box" id="chat-box">
            <div class="message ai-message">
                ¡Hola! Soy tu modelo local. Mis parámetros están listos. ¿De qué quieres hablar?
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Escribe un mensaje..." autocomplete="off" />
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
